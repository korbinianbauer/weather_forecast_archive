<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Weather Archive{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --border: #d1dce8;
      --primary: #1a6fb5;
      --primary-dark: #145a96;
      --text: #1a2332;
      --muted: #5a7089;
      --danger: #c0392b;
      --warm: #e07b39;
      --cold: #3a8fc7;
      --radius: 10px;
      --shadow: 0 2px 8px rgba(0,0,0,.08);
    }

    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg);
           color: var(--text); min-height: 100vh; }

    /* nav */
    nav { background: var(--primary); color: #fff; padding: .9rem 1.5rem;
          display: flex; align-items: center; gap: 1rem; box-shadow: 0 2px 6px rgba(0,0,0,.2); }
    nav a { color: #fff; text-decoration: none; font-weight: 600; font-size: 1.15rem; }
    nav .nav-subtitle { color: rgba(255,255,255,.7); font-size: .85rem; }

    /* layout */
    main { max-width: 1200px; margin: 2rem auto; padding: 0 1.25rem; }

    /* cards */
    .card { background: var(--surface); border: 1px solid var(--border);
            border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem; }

    /* buttons */
    .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .5rem 1rem;
           border-radius: 6px; border: none; cursor: pointer; font-size: .875rem;
           font-weight: 500; text-decoration: none; transition: filter .15s; }
    .btn:hover { filter: brightness(.9); }
    .btn-primary { background: var(--primary); color: #fff; }
    .btn-outline { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
    .btn-danger  { background: var(--danger); color: #fff; }
    .btn-sm { padding: .3rem .7rem; font-size: .8rem; }

    /* forecast strip */
    .forecast-strip { display: flex; gap: .75rem; overflow-x: auto;
                      padding-bottom: .5rem; scroll-snap-type: x mandatory; }
    .forecast-strip::-webkit-scrollbar { height: 5px; }
    .forecast-strip::-webkit-scrollbar-track { background: var(--border); border-radius: 3px; }
    .forecast-strip::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 3px; }

    .day-card { flex: 0 0 120px; scroll-snap-align: start; border: 1px solid var(--border);
                border-radius: var(--radius); padding: .75rem .5rem; text-align: center;
                background: var(--surface); }
    .day-card .day-name  { font-weight: 700; font-size: .8rem; color: var(--muted); text-transform: uppercase; }
    .day-card .day-date  { font-size: .75rem; color: var(--muted); margin-bottom: .4rem; }
    .day-card img.wicon  { width: 48px; height: 48px; margin: .25rem 0; }
    .day-card .condition { font-size: .75rem; color: var(--muted); min-height: 2.2em;
                           line-height: 1.2; margin-bottom: .35rem; }
    .day-card .temps     { font-size: 1rem; }
    .day-card .t-max     { font-weight: 700; color: var(--warm); }
    .day-card .t-min     { color: var(--cold); margin-left: .25rem; }
    .day-card .meta      { font-size: .7rem; color: var(--muted); margin-top: .3rem; line-height: 1.6; }

    /* archive table */
    .archive-table { width: 100%; border-collapse: collapse; font-size: .82rem; }
    .archive-table th { background: var(--bg); font-weight: 600; text-align: left;
                        padding: .5rem .75rem; border-bottom: 2px solid var(--border); }
    .archive-table td { padding: .45rem .75rem; border-bottom: 1px solid var(--border); vertical-align: middle; }
    .archive-table tr:last-child td { border-bottom: none; }
    .archive-table tr:hover td { background: #f7fafd; }
    .archive-table .t-max { color: var(--warm); font-weight: 600; }
    .archive-table .t-min { color: var(--cold); }
    .archive-table .poll-sep td { background: #eaf1f9 !important; font-weight: 600; color: var(--primary); }

    /* misc */
    .badge { display: inline-block; padding: .15rem .5rem; border-radius: 20px;
             font-size: .72rem; font-weight: 600; }
    .badge-blue { background: #dbeafe; color: #1e40af; }

    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--muted); }
    .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; }

    h2 { font-size: 1.2rem; font-weight: 700; margin-bottom: 1rem; }
    h3 { font-size: 1rem; font-weight: 700; margin-bottom: .75rem; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }

    .gap { margin-bottom: 1.5rem; }

    /* modal */
    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5);
                     z-index: 100; align-items: center; justify-content: center; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border-radius: var(--radius); padding: 1.5rem;
             width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
    .modal h2 { margin-bottom: 1rem; }
    .search-input { width: 100%; padding: .6rem .85rem; border: 1px solid var(--border);
                    border-radius: 6px; font-size: .95rem; outline: none; }
    .search-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(26,111,181,.15); }
    .search-results { margin-top: .5rem; border: 1px solid var(--border); border-radius: 6px;
                      overflow: hidden; display: none; }
    .search-results.visible { display: block; }
    .search-result-item { padding: .65rem 1rem; cursor: pointer; font-size: .875rem;
                          border-bottom: 1px solid var(--border); }
    .search-result-item:last-child { border-bottom: none; }
    .search-result-item:hover { background: #f0f7ff; }
    .search-result-item .city-name { font-weight: 600; }
    .search-result-item .city-meta { font-size: .75rem; color: var(--muted); }
    .modal-footer { margin-top: 1rem; display: flex; gap: .75rem; justify-content: flex-end; }
    .form-hidden { position: absolute; opacity: 0; pointer-events: none; }
  </style>
</head>
<body>

<nav>
  <a href="/">&#9925; Weather Archive</a>
  <span class="nav-subtitle" style="flex:1;">Wetter.com &amp; Meteoblue · forecast history</span>
  <a href="/db" style="color:rgba(255,255,255,.75); font-size:.82rem; font-weight:500; text-decoration:none;">🗄 DB</a>
  {% if session.logged_in %}
  <form method="post" action="{{ url_for('logout') }}" style="margin:0;">
    <button type="submit"
            style="background:none; border:1px solid rgba(255,255,255,.4); color:rgba(255,255,255,.85);
                   border-radius:5px; padding:.25rem .65rem; cursor:pointer; font-size:.8rem;">
      Sign out
    </button>
  </form>
  {% else %}
  <a href="{{ url_for('login') }}"
     style="color:rgba(255,255,255,.85); font-size:.8rem; font-weight:500; text-decoration:none;
            border:1px solid rgba(255,255,255,.4); border-radius:5px; padding:.25rem .65rem;">
    Sign in
  </a>
  {% endif %}
</nav>

<main>
  {% block content %}{% endblock %}
</main>

{% block scripts %}{% endblock %}
<script>
function fmtLocalTime(utcIso) {
  const d = new Date(utcIso.endsWith('Z') ? utcIso : utcIso + 'Z');
  const pad = n => String(n).padStart(2, '0');
  return pad(d.getDate()) + '.' + pad(d.getMonth() + 1) + '.' + d.getFullYear()
       + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
}
document.addEventListener('DOMContentLoaded', () => {
  document.querySelectorAll('time.local-time').forEach(el => {
    el.textContent = fmtLocalTime(el.getAttribute('datetime'));
  });
});
</script>
</body>
</html>
